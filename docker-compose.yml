version: '3.8'

services:

  # --- Base de données MySQL ---
  db:
    image: mysql:8.0
    container_name: placementpro_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: placementpro_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # --- Backend Django ---
  backend:
    build: ./PlacementPro_backend
    container_name: placementpro_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./PlacementPro_backend:/app
      - media_data:/app/media

  # --- Celery Worker ---
  celery:
    build: ./PlacementPro_backend
    container_name: placementpro_celery
    restart: unless-stopped
    command: celery -A PlacementPro_backend worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - backend
      - redis

  # --- Celery Beat ---
  celery-beat:
    build: ./PlacementPro_backend
    container_name: placementpro_celery_beat
    restart: unless-stopped
    command: celery -A PlacementPro_backend beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - backend
      - redis

  # --- Frontend React ---
  frontend:
    build: ./PlacementPro_frontend
    container_name: placementpro_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

  # --- Prometheus ---
  prometheus:
    image: prom/prometheus:latest
    container_name: placementpro_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - backend

  # --- Grafana ---
  grafana:
    image: grafana/grafana:latest
    container_name: placementpro_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # --- Node Exporter ---
  node-exporter:
    image: prom/node-exporter:latest
    container_name: placementpro_node_exporter
    restart: unless-stopped
    ports:
      - "9101:9100"

volumes:
  mysql_data:
  media_data:
  grafana_data: