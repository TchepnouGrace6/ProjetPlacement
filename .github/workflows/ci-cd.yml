name: CI/CD Pipeline - PlacementPro

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 : Lint & vérification Backend Django
  # ──────────────────────────────────────────────
  backend-check:
    name: 🐍 Backend Django - Vérification
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐍 Installation de Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: 📦 Installation des dépendances
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ✅ Vérification de la configuration Django
        working-directory: backend
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: ${{ secrets.DJANGO_ALLOWED_HOSTS }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python manage.py check --deploy 2>/dev/null || python manage.py check

      - name: 🗃️ Vérification des migrations
        working-directory: backend
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_DEBUG: "False"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python manage.py migrate --run-syncdb --check 2>/dev/null || echo "Migrations à appliquer lors du déploiement"

  # ──────────────────────────────────────────────
  # JOB 2 : Build Frontend React
  # ──────────────────────────────────────────────
  frontend-build:
    name: ⚛️ Frontend React - Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🟢 Installation de Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Installation des dépendances npm
        working-directory: frontend
        run: npm ci

      - name: 🏗️ Build de production React
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          CI: false
        run: npm run build

      - name: 💾 Sauvegarde du build (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          # Si tu utilises Vite, remplace frontend/build/ par frontend/dist/
          retention-days: 1

  # ──────────────────────────────────────────────
  # JOB 3 : Déploiement Backend Django sur o2switch
  # ──────────────────────────────────────────────
  deploy-backend:
    name: 🚀 Déploiement Backend sur o2switch
    runs-on: ubuntu-latest
    needs: [backend-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 📤 Transfert FTP du backend vers o2switch
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: ./backend/
          server-dir: ${{ secrets.FTP_BACKEND_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/__pycache__/**
            **/*.pyc
            **/*.pyo
            **/.env
            **/.env.*
            **/db.sqlite3
            **/.DS_Store
            **/venv/**
            **/.venv/**

      - name: ✅ Confirmation du déploiement backend
        run: |
          echo "✅ Backend Django déployé avec succès sur o2switch"
          echo "📁 Répertoire cible : ${{ secrets.FTP_BACKEND_DIR }}"

  # ──────────────────────────────────────────────
  # JOB 4 : Déploiement Frontend React sur o2switch
  # ──────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Déploiement Frontend sur o2switch
    runs-on: ubuntu-latest
    needs: [frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 📥 Récupération du build React
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./frontend-dist/

      - name: 📤 Transfert FTP du frontend vers o2switch
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: ./frontend-dist/
          server-dir: ${{ secrets.FTP_FRONTEND_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store

      - name: ✅ Confirmation du déploiement frontend
        run: |
          echo "✅ Frontend React déployé avec succès sur o2switch"
          echo "📁 Répertoire cible : ${{ secrets.FTP_FRONTEND_DIR }}"

  # ──────────────────────────────────────────────
  # JOB 5 : Notification finale
  # ──────────────────────────────────────────────
  notify:
    name: 📣 Notification de déploiement
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🎉 Résumé du pipeline
        run: |
          echo "======================================"
          echo "  PIPELINE PlacementPro - RÉSUMÉ"
          echo "======================================"
          echo "🔀 Branche     : ${{ github.ref_name }}"
          echo "👤 Déclenché par : ${{ github.actor }}"
          echo "📝 Commit      : ${{ github.sha }}"
          echo "🕐 Date        : $(date '+%d/%m/%Y %H:%M:%S')"
          echo "======================================"
          echo "Backend  : ${{ needs.deploy-backend.result }}"
          echo "Frontend : ${{ needs.deploy-frontend.result }}"
          echo "======================================"