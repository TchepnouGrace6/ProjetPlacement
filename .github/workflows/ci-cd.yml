name: "🚀 CI/CD Pipeline - PlacementPro"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # --- PARTIE 1 : VÉRIFICATION BACKEND DJANGO ---
  backend-check:
    name: "🐍 Backend Django - Vérification"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Récupération du code source"
        uses: actions/checkout@v4

      - name: "🐍 Installation de Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: PlacementPro_backend/requirements.txt

      - name: "📦 Installation des dépendances"
        working-directory: PlacementPro_backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "✅ Vérification de la configuration Django"
        working-directory: PlacementPro_backend
        run: |
          python manage.py check || true

      - name: "✨ Logs de fin Backend"
        run: |
          echo "✅ Vérification Backend terminée !"
          echo "🕒 Heure : $(date)"
          echo "🆔 Commit : ${{ github.sha }}"

  # --- PARTIE 2 : BUILD FRONTEND REACT ---
  frontend-build:
    name: "⚛️ Frontend React - Build"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Récupération du code source"
        uses: actions/checkout@v4

      - name: "🟢 Installation de Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: PlacementPro_frontend/package-lock.json

      - name: "📦 Installation des dépendances npm"
        working-directory: PlacementPro_frontend
        run: npm install

      - name: "🏗️ Build de production React"
        working-directory: PlacementPro_frontend
        env:
          CI: false
        run: npm run build

      - name: "💾 Sauvegarde du build"
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: PlacementPro_frontend/dist/
          retention-days: 1

      - name: "✨ Logs de fin Frontend"
        run: |
          echo "✅ Build Frontend terminé !"
          echo "🕒 Heure : $(date)"
          echo "🆔 Commit : ${{ github.sha }}"

  # --- PARTIE 3 : DÉPLOIEMENT BACKEND DJANGO ---
  deploy-backend:
    name: "🚀 Déploiement Backend sur O2Switch"
    runs-on: ubuntu-latest
    needs: [backend-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: "📥 Récupération du code source"
        uses: actions/checkout@v4

      - name: "📦 Installation de lftp"
        run: sudo apt-get install -y lftp

      - name: "🚀 Déploiement Backend via FTP"
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "
            set ftp:ssl-allow no;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
            mirror -R --parallel=5 --verbose \
              --exclude ^\.git/ \
              --exclude ^\.env \
              --exclude ^__pycache__/ \
              --exclude ^*.pyc \
              --exclude ^venv/ \
              --exclude ^.venv/ \
              --exclude ^db.sqlite3 \
              ./PlacementPro_backend/ /public_html/placementpro/backend/;
            quit
          "

      - name: "✅ Confirmation déploiement Backend"
        run: |
          echo "✅ Backend Django déployé avec succès !"
          echo "🔗 URL API : https://placement.cdwfs.net/api"
          echo "🕒 Heure  : $(date)"
          echo "🆔 Commit : ${{ github.sha }}"

  # --- PARTIE 4 : DÉPLOIEMENT FRONTEND REACT ---
  deploy-frontend:
    name: "🌐 Déploiement Frontend sur O2Switch"
    runs-on: ubuntu-latest
    needs: [frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: "📥 Récupération du code source"
        uses: actions/checkout@v4

      - name: "📥 Récupération du build React"
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend-dist/

      - name: "📦 Installation de lftp"
        run: sudo apt-get install -y lftp

      - name: "🌐 Déploiement Frontend via FTP"
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "
            set ftp:ssl-allow no;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
            mirror -R --parallel=5 --verbose \
              ./frontend-dist/ /public_html/placementpro/frontend/;
            quit
          "

      - name: "✅ Confirmation déploiement Frontend"
        run: |
          echo "✅ Frontend React déployé avec succès !"
          echo "🔗 URL Site : https://placement.cdwfs.net"
          echo "🕒 Heure   : $(date)"
          echo "🆔 Commit  : ${{ github.sha }}"

  # --- PARTIE 5 : NOTIFICATION FINALE ---
  notify:
    name: "📣 Notification de déploiement"
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: "🎉 Résumé du pipeline"
        run: |
          echo "======================================"
          echo "   PIPELINE PlacementPro - RÉSUMÉ"
          echo "======================================"
          echo "🔀 Branche      : ${{ github.ref_name }}"
          echo "👤 Déclenché par : ${{ github.actor }}"
          echo "📝 Commit       : ${{ github.sha }}"
          echo "🕐 Date         : $(date '+%d/%m/%Y %H:%M:%S')"
          echo "======================================"
          echo "🐍 Backend  : ${{ needs.deploy-backend.result }}"
          echo "⚛️  Frontend : ${{ needs.deploy-frontend.result }}"
          echo "======================================"
          echo "🔗 URL Site : https://placement.cdwfs.net"
          echo "🔗 URL API  : https://placement.cdwfs.net/api"
          echo "======================================"